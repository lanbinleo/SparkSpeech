<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SparkSpeech</title>
  </head>
  <body>
    <script>
      if (new URLSearchParams(location.search).get("overlay") === "1") {
        document.documentElement.classList.add("overlay-html");
      }
    </script>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-mark">S</div>
        <div>
          <strong>SparkSpeech</strong>
          <span>正在加载</span>
        </div>
      </div>
    </div>
    <style>
      .boot-screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 12px;
        background: #f6f5f4;
        color: #191817;
        font-family: Inter, system-ui, "Microsoft YaHei", sans-serif;
        text-align: center;
      }
      .boot-mark {
        display: grid;
        width: 38px;
        height: 38px;
        margin: 0 auto;
        place-items: center;
        border-radius: 8px;
        background: #191817;
        color: #fff;
        font-weight: 700;
      }
      .boot-screen strong,
      .boot-screen span {
        display: block;
      }
      .boot-screen span {
        margin-top: 2px;
        color: #6e6964;
        font-size: 13px;
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
